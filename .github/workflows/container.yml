name: Container

on:
  workflow_call:
    inputs:
      push:
        description: Push the built image to GHCR.
        required: true
        type: boolean
      image-tags:
        description: Docker metadata-action tag rules.
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set image metadata
        id: vars
        shell: bash
        run: echo "short_sha=${HEAD_SHA::7}" >> "$GITHUB_OUTPUT"
        env:
          HEAD_SHA: ${{ github.sha }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=pr,enable=${{ inputs.push == false }}
            type=raw,value=sha-${{ steps.vars.outputs.short_sha }},enable=${{ inputs.push }}
            ${{ inputs['image-tags'] }}

      - name: Build Docker image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: ./
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: inputs.push
        run: echo ${{ steps.docker_build.outputs.digest }}
